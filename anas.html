<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة افتتاح - تشارت</title>

    <!-- خط تجوال (Tajawal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- الإعدادات الأساسية --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #eaddcf; 
            font-family: 'Tajawal', sans-serif; 
            color: #4a3e35; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; 
            position: relative;
        }

        /* --- أنيميشن الدخول --- */
        @keyframes fadeUpEntrance {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-enter {
            opacity: 0; 
            animation: fadeUpEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.6s; }

        /* --- حركة الدوائر المتطايرة --- */
        .floating-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0; 
        }

        .floating-circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(163, 140, 118, 0.35);
            border-radius: 50%;
            animation: floatUp 25s linear infinite;
            bottom: -150px;
        }

        .floating-circles li:nth-child(1) { left: 10%; width: 60px; height: 60px; animation-duration: 20s; }
        .floating-circles li:nth-child(2) { left: 20%; width: 25px; height: 25px; animation-duration: 15s; animation-delay: 2s; background: rgba(255, 255, 255, 0.5); } 
        .floating-circles li:nth-child(3) { left: 25%; width: 40px; height: 40px; animation-duration: 25s; animation-delay: 4s; }
        .floating-circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-duration: 18s; animation-delay: 0s; background: rgba(255, 255, 255, 0.35); }
        .floating-circles li:nth-child(5) { left: 55%; width: 20px; height: 20px; animation-duration: 22s; animation-delay: 5s; }
        .floating-circles li:nth-child(6) { left: 70%; width: 70px; height: 70px; animation-duration: 20s; animation-delay: 3s; }
        .floating-circles li:nth-child(7) { left: 80%; width: 90px; height: 90px; animation-duration: 24s; animation-delay: 7s; background: rgba(163, 140, 118, 0.25); }
        .floating-circles li:nth-child(8) { left: 90%; width: 30px; height: 30px; animation-duration: 16s; animation-delay: 15s; background: rgba(255, 255, 255, 0.6); } 
        .floating-circles li:nth-child(9) { left: 15%; width: 15px; height: 15px; animation-duration: 19s; animation-delay: 1s; background: rgba(255, 255, 255, 0.45); }
        .floating-circles li:nth-child(10) { left: 85%; width: 100px; height: 100px; animation-duration: 26s; animation-delay: 0s; background: rgba(163, 140, 118, 0.2); }
        .floating-circles li:nth-child(11) { left: 5%; width: 35px; height: 35px; animation-duration: 14s; animation-delay: 6s; background: rgba(163, 140, 118, 0.45); } 
        .floating-circles li:nth-child(12) { left: 35%; width: 50px; height: 50px; animation-duration: 21s; animation-delay: 9s; }
        .floating-circles li:nth-child(13) { left: 50%; width: 25px; height: 25px; animation-duration: 17s; animation-delay: 2s; background: rgba(255, 255, 255, 0.4); }
        .floating-circles li:nth-child(14) { left: 65%; width: 80px; height: 80px; animation-duration: 28s; animation-delay: 4s; }
        .floating-circles li:nth-child(15) { left: 75%; width: 15px; height: 15px; animation-duration: 13s; animation-delay: 8s; background: rgba(255, 255, 255, 0.7); } 
        .floating-circles li:nth-child(16) { left: 45%; width: 110px; height: 110px; animation-duration: 30s; animation-delay: 11s; background: rgba(163, 140, 118, 0.15); }
        .floating-circles li:nth-child(17) { left: 95%; width: 35px; height: 35px; animation-duration: 18s; animation-delay: 1s; }
        .floating-circles li:nth-child(18) { left: 60%; width: 45px; height: 45px; animation-duration: 23s; animation-delay: 10s; background: rgba(255, 255, 255, 0.3); }
        .floating-circles li:nth-child(19) { left: 30%; width: 12px; height: 12px; animation-duration: 12s; animation-delay: 5s; background: rgba(163, 140, 118, 0.5); }
        .floating-circles li:nth-child(20) { left: 10%; width: 85px; height: 85px; animation-duration: 27s; animation-delay: 14s; }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-1200px) scale(1.3); opacity: 0; }
        }

        /* --- المحتوى الأساسي وتنسيق الإطار (Arch) --- */
        .splash-container {
            position: relative;
            z-index: 10; 
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* توسيط الإطار في الشاشة */
            align-items: center;
            padding: 4vh 20px;
        }

        /* --- الإطار المقوس (Arch Frame) --- */
        .arch-frame {
            /* تصميم الإطار: أبيض شفاف مع تأثير الزجاج */
            background-color: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            /* قوس دائري من فوق، ومربع بحواف ناعمة من تحت */
            border-radius: 180px 180px 20px 20px;
            padding: 50px 24px 30px 24px;
            width: 100%;
            max-width: 320px; /* عرض الإطار */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(74, 62, 53, 0.08); /* ظل خفيف لإبراز الإطار */
            margin-bottom: 30px;
        }

        /* أيقونة القهوة أعلى الإطار */
        .coffee-icon {
            width: 40px;
            height: 40px;
            color: #7a6554; /* نفس لون التاريخ */
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .info-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 24px;
            text-align: center;
        }

        .custom-arabic-text {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            color: #2b231d;
            letter-spacing: -0.5px;
        }

        .date-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: #7a6554;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .invitation-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: #4a3e35;
            line-height: 1.7;
        }

        .qr-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .qr-card {
            background-color: #ffffff; /* لون أبيض صافي عشان الباركود ينقرئ بسرعة */
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(74, 62, 53, 0.05);
            width: 100%;
            max-width: 200px; /* تصغير الباركود شوي عشان يتناسب مع الإطار */
        }

        .qr-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }

        /* الشعار بالأسفل */
        .footer-logo-container {
            margin-top: auto; /* يدف الشعار لأسفل الشاشة */
        }

        .establishment-logo {
            width: 140px;
            height: auto;
            display: block;
            mix-blend-mode: multiply;
            opacity: 0.85;
        }

        /* للهواتف الصغيرة */
        @media (max-height: 700px) {
            .arch-frame {
                padding: 40px 20px 20px;
                max-width: 300px;
            }
            .custom-arabic-text { font-size: 1.6rem; }
            .invitation-text { font-size: 0.95rem; }
            .qr-card { max-width: 180px; padding: 12px; }
            .establishment-logo { width: 120px; }
        }
    </style>
</head>
<body>

    <!-- الدوائر المتطايرة -->
    <ul class="floating-circles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <main class="splash-container">

        <!-- الإطار المقوس (يحتوي على الأيقونة، النص، والباركود) -->
        <div class="arch-frame animate-enter delay-1">
            
            <!-- أيقونة القهوة الفخمة -->
            <div class="coffee-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                    <line x1="6" y1="1" x2="6" y2="4"></line>
                    <line x1="10" y1="1" x2="10" y2="4"></line>
                    <line x1="14" y1="1" x2="14" y2="4"></line>
                </svg>
            </div>

            <!-- النص -->
            <header class="info-header">
                <h1 class="custom-arabic-text">حياكم الله في تشارت</h1>
                <p class="date-text" dir="ltr">15 / 06 / 2026</p>
                <div class="invitation-text">
                    أبوابنا فُتحت لكم، وقهوتنا استوت بمزاج.<br>
                    نتشرف بحضوركم الكريم لتشاركونا افتتاح تشارت،<br>
                    أهلاً وسهلاً.
                </div>
            </header>

            <!-- الباركود -->
            <section class="qr-wrapper">
                <div class="qr-card">
                    <img src="aa.png" alt="Scan QR Code" class="qr-image">
                </div>
            </section>

        </div>

        <!-- شعار المقهى خارج الإطار (بالأسفل) -->
        <footer class="footer-logo-container animate-enter delay-2">
            <img src="bb.png" alt="Establishment Logo" class="establishment-logo">
        </footer>

    </main>

</body>
</html>
